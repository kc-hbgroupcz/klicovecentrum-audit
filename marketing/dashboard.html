<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<title>Marketing Dashboard — klicovecentrum.cz</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0b0f1a;
    --bg-card: #131826;
    --bg-card-hover: #1a2033;
    --border: #232a3d;
    --text: #e6e9f0;
    --text-muted: #8b93a7;
    --accent: #4ea1ff;
    --accent-hover: #74b6ff;
    --green: #4ade80;
    --orange: #fb923c;
    --red: #f87171;
    --yellow: #fbbf24;
    --purple: #a78bfa;
    --gray: #6b7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }
  /* HEADER */
  .header {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 700;
  }
  .breadcrumb {
    color: var(--text-muted);
    font-size: 13px;
  }
  .breadcrumb a {
    color: var(--accent);
    text-decoration: none;
  }
  .data-freshness {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: rgba(74, 222, 128, 0.15);
    border: 1px solid rgba(74, 222, 128, 0.3);
    border-radius: 8px;
    color: var(--green);
    font-size: 12px;
    font-weight: 600;
  }
  .data-freshness.warn {
    background: rgba(251, 191, 36, 0.15);
    border-color: rgba(251, 191, 36, 0.3);
    color: var(--yellow);
  }
  .data-freshness.critical {
    background: rgba(248, 113, 113, 0.15);
    border-color: rgba(248, 113, 113, 0.3);
    color: var(--red);
  }
  .logout-link {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 13px;
    text-decoration: none;
    transition: all 0.2s ease;
  }
  .logout-link:hover {
    color: var(--red);
    border-color: var(--red);
  }
  /* DATE PICKER BAR */
  .date-bar {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .date-presets {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .date-preset {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .date-preset:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .date-preset.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .date-custom {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: 8px;
    padding-left: 12px;
    border-left: 1px solid var(--border);
  }
  .date-custom input[type="date"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 8px;
    border-radius: 6px;
    font-size: 12px;
    color-scheme: dark;
  }
  .date-custom label { font-size: 12px; color: var(--text-muted); }
  .compare-select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 8px;
    border-radius: 6px;
    font-size: 12px;
    margin-left: auto;
  }
  /* ALERT BANNER */
  .alert-banner {
    background: rgba(248, 113, 113, 0.1);
    border: 1px solid rgba(248, 113, 113, 0.3);
    color: var(--red);
    padding: 10px 24px;
    font-size: 13px;
    display: none;
  }
  .alert-banner.show { display: block; }
  /* TABS */
  .tabs-bar {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: thin;
  }
  .tab {
    background: transparent;
    border: none;
    color: var(--text-muted);
    padding: 12px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.15s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .tab:hover {
    color: var(--text);
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .tab .tab-status {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 8px;
    font-weight: 700;
  }
  .tab .tab-status.live {
    background: rgba(74, 222, 128, 0.15);
    color: var(--green);
  }
  .tab .tab-status.waiting {
    background: rgba(251, 146, 60, 0.15);
    color: var(--orange);
  }
  .tab .tab-status.api {
    background: rgba(167, 139, 250, 0.15);
    color: var(--purple);
  }
  /* MAIN CONTENT */
  .main {
    padding: 24px;
    max-width: 1600px;
    margin: 0 auto;
  }
  .section-title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .section-subtitle {
    color: var(--text-muted);
    font-size: 14px;
    margin-bottom: 24px;
  }
  /* HERO KPI CARDS */
  .hero-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .kpi-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
  }
  .kpi-label {
    color: var(--text-muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .kpi-value {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .kpi-delta {
    font-size: 12px;
    font-weight: 600;
  }
  .kpi-delta.positive { color: var(--green); }
  .kpi-delta.negative { color: var(--red); }
  .kpi-delta.neutral { color: var(--text-muted); }
  /* SECTION GRID (for charts + tables) */
  .section-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  .section-grid.full { grid-template-columns: 1fr; }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .chart-wrapper {
    position: relative;
    height: 280px;
  }
  /* TABLE */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th, td {
    text-align: left;
    padding: 8px;
    border-bottom: 1px solid var(--border);
  }
  th {
    color: var(--text-muted);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  /* EMPTY STATE */
  .empty-state {
    background: var(--bg-card);
    border: 1px dashed var(--border);
    border-radius: 12px;
    padding: 60px 24px;
    text-align: center;
    color: var(--text-muted);
  }
  .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { color: var(--text); margin-bottom: 8px; font-size: 18px; }
  .empty-state p { font-size: 14px; line-height: 1.6; max-width: 500px; margin: 0 auto 16px; }
  .empty-state a {
    color: var(--accent);
    text-decoration: none;
  }
  /* LOADING */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px;
    color: var(--text-muted);
  }
  /* RESPONSIVE */
  @media (max-width: 768px) {
    .section-grid { grid-template-columns: 1fr; }
    .header { padding: 12px 16px; }
    .date-bar { padding: 10px 16px; }
    .tabs-bar { padding: 0 16px; }
    .main { padding: 16px; }
  }
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════
// MARKETING DASHBOARD — SCAFFOLD v0.1
// ═══════════════════════════════════════════════════════════════

const STATE = {
  section: 0,
  dateFrom: null,
  dateTo: null,
  comparePreset: 'previous',
  preset: 'last7',
  market: 'all',     // all | cz | sk
  type: 'all',       // all | b2c | b2b
  domain: 'all',     // all | klicovecentrum.cz | klucovecentrum.sk | hbgroup.cz | hbgroup.sk
  data: {},
};

// SECTION METADATA — domains_only specifies pro které domény je sekce relevantní
// Pokud user vybere filter (market/type/domain) co nepokrývá danou sekci → empty state
const SECTIONS = {
  0: { title: 'Executive Summary', subtitle: 'Top-level metriky napříč všemi kanály', status: 'live' },
  1: { title: 'Kampaně (PPC)', subtitle: 'Google Ads + Sklik + Meta — jen B2C (B2B nepoužívá ads)', status: 'live', domains_only: ['klicovecentrum.cz', 'klucovecentrum.sk'] },
  2: { title: 'SEO', subtitle: 'Google Search Console + Bing Webmaster', status: 'live' },
  3: { title: 'B2C E-shop', subtitle: 'klicovecentrum.cz výkon', status: 'live' },
  4: { title: 'B2B', subtitle: 'hbgroup.cz odběratelé', status: 'live' },
  5: { title: 'Srovnávače', subtitle: 'Heuréka, Zboží, Alza, Glami — jen B2C (B2B nepoužívá srovnávače)', status: 'waiting', wait_for: 'Heuréka Conversion Reports API klíč (klient poslal jiný klíč pro Overeno zákazníky — funguje pro NPS, ale ne pro statistiky). Plus Zboží.cz/Alza Partner CSV.', domains_only: ['klicovecentrum.cz', 'klucovecentrum.sk'] },
  6: { title: 'Feedy', subtitle: 'Mergado + Google Merchant Center — jen klicovecentrum.cz dnes (klucovecentrum.sk čeká na MC setup)', status: 'live', domains_only: ['klicovecentrum.cz', 'klucovecentrum.sk'] },
  7: { title: 'Produkty', subtitle: 'Top SKU + per-produkt výkon', status: 'live' },
  8: { title: 'Kategorie', subtitle: 'Výkon kategorií produktů', status: 'live' },
  9: { title: 'Pobočky', subtitle: '16 prodejen + skladů (kód podskladu z ERP)', status: 'live' },
  10: { title: 'Kraje', subtitle: 'Geografická distribuce ČR', status: 'live' },
  11: { title: 'Doprava', subtitle: 'PPL + ostatní dopravci', status: 'live' },
  12: { title: 'Reklamace', subtitle: 'RMA + příčiny + náklady', status: 'live' },
  13: { title: 'Vratky', subtitle: 'Returns + refundy', status: 'live' },
  14: { title: 'Cross-channel Holistic', subtitle: 'MER, LTV:CAC, NRR, attribution', status: 'live' },
  15: { title: 'Google Business Profile', subtitle: '17 prodejen — API funguje, čeká na quota increase', status: 'api', wait_for: 'GBP API enabled + Service Account přidán jako Manager. Default quota Google nasadil 1 req/min — vyžádat increase přes support.google.com/business/contact/api_default_quota_increase' },
  16: { title: 'Firmy.cz', subtitle: 'Import feed (auto-sync) + manuální stats CSV — jen CZ (Seznam je český)', status: 'waiting', wait_for: 'Master tabulka 17 prodejen → data/raw/pobocky_master.csv', domains_only: ['klicovecentrum.cz', 'hbgroup.cz'] },
  17: { title: 'Google Merchant Center', subtitle: 'Shopping deep-dive — jen klicovecentrum.cz (Merchant 130672692, 2228 produktů, 99.24% approval). klucovecentrum.sk čeká na MC setup.', status: 'live', data_url: '../data/marketing/mc.json', domains_only: ['klicovecentrum.cz', 'klucovecentrum.sk'] },
  18: { title: 'Cloudflare ochrana', subtitle: '4 domény za Cloudflare Free + replikované rules + acceptance test 28/28 ✅', status: 'live' },
};

// ═══════════════════════════════════════════════════════════════
// DATE PICKER
// ═══════════════════════════════════════════════════════════════

function calcPresetDates(preset) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const yesterday = new Date(today);
  yesterday.setDate(yesterday.getDate() - 1);

  let from, to = yesterday;
  switch (preset) {
    case 'today': from = to = today; break;
    case 'yesterday': from = to = yesterday; break;
    case 'last7': from = new Date(yesterday); from.setDate(from.getDate() - 6); break;
    case 'last14': from = new Date(yesterday); from.setDate(from.getDate() - 13); break;
    case 'last28': from = new Date(yesterday); from.setDate(from.getDate() - 27); break;
    case 'last30': from = new Date(yesterday); from.setDate(from.getDate() - 29); break;
    case 'last90': from = new Date(yesterday); from.setDate(from.getDate() - 89); break;
    case 'mtd': from = new Date(today.getFullYear(), today.getMonth(), 1); break;
    case 'lastmonth':
      from = new Date(today.getFullYear(), today.getMonth() - 1, 1);
      to = new Date(today.getFullYear(), today.getMonth(), 0);
      break;
    case 'qtd':
      const q = Math.floor(today.getMonth() / 3);
      from = new Date(today.getFullYear(), q * 3, 1);
      break;
    case 'ytd': from = new Date(today.getFullYear(), 0, 1); break;
    case 'last12m': from = new Date(yesterday); from.setMonth(from.getMonth() - 12); break;
    default: from = new Date(yesterday); from.setDate(from.getDate() - 6);
  }
  return [from, to];
}

function fmtDate(d) {
  return d.toISOString().slice(0, 10);
}

function applyPreset(preset) {
  STATE.preset = preset;
  const [from, to] = calcPresetDates(preset);
  STATE.dateFrom = fmtDate(from);
  STATE.dateTo = fmtDate(to);
  document.getElementById('dateFrom').value = STATE.dateFrom;
  document.getElementById('dateTo').value = STATE.dateTo;
  document.querySelectorAll('.date-preset').forEach(b => b.classList.toggle('active', b.dataset.preset === preset));
  saveStateToURL();
  renderSection(STATE.section);
}

// ═══════════════════════════════════════════════════════════════
// URL STATE
// ═══════════════════════════════════════════════════════════════

function saveStateToURL() {
  const params = new URLSearchParams();
  params.set('section', STATE.section);
  params.set('from', STATE.dateFrom);
  params.set('to', STATE.dateTo);
  params.set('compare', STATE.comparePreset);
  if (STATE.preset) params.set('preset', STATE.preset);
  if (STATE.market !== 'all') params.set('market', STATE.market);
  if (STATE.type !== 'all') params.set('type', STATE.type);
  if (STATE.domain !== 'all') params.set('domain', STATE.domain);
  history.replaceState(null, '', '?' + params.toString());
  localStorage.setItem('mkt-state', JSON.stringify({
    section: STATE.section, from: STATE.dateFrom, to: STATE.dateTo,
    compare: STATE.comparePreset, preset: STATE.preset,
    market: STATE.market, type: STATE.type, domain: STATE.domain,
  }));
}

function loadStateFromURL() {
  const params = new URLSearchParams(location.search);
  const stored = JSON.parse(localStorage.getItem('mkt-state') || '{}');
  STATE.section = parseInt(params.get('section') ?? stored.section ?? 0);

async function loadMeta() {
  try {
    const r = await fetch('../data/marketing/_meta.json?v=' + Date.now());
    if (!r.ok) throw new Error('no meta');
    const meta = await r.json();
    const ts = new Date(meta.last_refresh);
    const ageHours = (Date.now() - ts.getTime()) / 3600000;
    const el = document.getElementById('freshness');
    let icon = '🟢', cls = '', label;
    if (ageHours < 8) { icon = '🟢'; cls = ''; label = `Aktuální · ${formatAge(ageHours)} starší`; }
    else if (ageHours < 25) { icon = '🟡'; cls = 'warn'; label = `Aktuální · ${formatAge(ageHours)} starší`; }
    else { icon = '🔴'; cls = 'critical'; label = `ZASTARALÁ · ${formatAge(ageHours)} starší`; }
    el.className = 'data-freshness ' + cls;
    el.textContent = `${icon} ${label}`;
  } catch (e) {
    const el = document.getElementById('freshness');
    el.className = 'data-freshness warn';
    el.textContent = '⚠️ Dashboard ještě nebyl postaven (build pipeline pending)';
  }
}

function formatAge(hours) {
  if (hours < 1) return Math.round(hours * 60) + 'min';
  if (hours < 24) return Math.round(hours) + 'h';
  return Math.round(hours / 24) + 'd';
}

function isFilterCompatible(meta) {
  // Pokud meta nemá domains_only → žádné omezení
  if (!meta.domains_only) return { ok: true };

  const allowedDomains = meta.domains_only;

  // Domain filter zvolen → musí být v allowedDomains
  if (STATE.domain !== 'all' && !allowedDomains.includes(STATE.domain)) {
    return { ok: false, reason: `Tato sekce nepokrývá doménu ${STATE.domain}. Pokrývá: ${allowedDomains.join(', ')}` };
  }

  // Type filter — odvodit které domény projdou
  let candidates = ['klicovecentrum.cz', 'klucovecentrum.sk', 'hbgroup.cz', 'hbgroup.sk'];
  if (STATE.type === 'b2c') candidates = candidates.filter(d => d.includes('klicovecentrum') || d.includes('klucovecentrum'));
  if (STATE.type === 'b2b') candidates = candidates.filter(d => d.includes('hbgroup'));
  if (STATE.market === 'cz') candidates = candidates.filter(d => d.endsWith('.cz'));
  if (STATE.market === 'sk') candidates = candidates.filter(d => d.endsWith('.sk'));

  const overlap = candidates.filter(d => allowedDomains.includes(d));
  if (overlap.length === 0) {
    return { ok: false, reason: `Filter neodpovídá této sekci. Sekce pokrývá: ${allowedDomains.join(', ')}` };
  }

  return { ok: true };
}

async function renderSection(idx) {
  STATE.section = idx;
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', parseInt(b.dataset.section) === idx));
  saveStateToURL();

  const meta = SECTIONS[idx];
  const main = document.getElementById('main');

  // Check filter compatibility
  const compat = isFilterCompatible(meta);
  if (!compat.ok) {
    main.innerHTML = `
      <div class="section-title">${meta.title}</div>
      <div class="section-subtitle">${meta.subtitle}</div>
      <div class="empty-state">
        <div class="empty-state-icon">🚫</div>
        <h3>Sekce nedostupná pro aktuální filter</h3>
        <p>${compat.reason}</p>
        <p style="margin-top: 16px;">
          <button class="btn btn-secondary" onclick="document.getElementById('marketFilter').value='all';document.getElementById('typeFilter').value='all';document.getElementById('domainFilter').value='all';STATE.market='all';STATE.type='all';STATE.domain='all';saveStateToURL();renderSection(${idx});" style="background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer;">Reset filtru</button>
        </p>
      </div>
    `;
    return;
  }

  // Title + filter chips
  let filterChips = '';
  if (STATE.domain !== 'all') {
    filterChips += `<span style="background: var(--accent); color: white; padding: 2px 8px; border-radius: 6px; font-size: 11px; margin-left: 8px;">🌐 ${STATE.domain}</span>`;
  } else {
    if (STATE.market !== 'all') filterChips += `<span style="background: rgba(78,161,255,0.2); color: var(--accent); padding: 2px 8px; border-radius: 6px; font-size: 11px; margin-left: 8px;">${STATE.market === 'cz' ? '🇨🇿 CZ' : '🇸🇰 SK'}</span>`;
    if (STATE.type !== 'all') filterChips += `<span style="background: rgba(78,161,255,0.2); color: var(--accent); padding: 2px 8px; border-radius: 6px; font-size: 11px; margin-left: 8px;">${STATE.type === 'b2c' ? '🛒 B2C' : '🏢 B2B'}</span>`;
  }
  let html = `
    <div class="section-title">${meta.title}${filterChips}</div>
    <div class="section-subtitle">${meta.subtitle} · ${STATE.dateFrom} → ${STATE.dateTo}</div>
  `;

  // Status-based content
  if (meta.status === 'waiting' || meta.status === 'api') {
    html += renderWaitingState(idx, meta);
  } else {
    html += `<div class="loading">Načítám data pro ${meta.title}…</div>`;
  }
  main.innerHTML = html;

  // Build live sections
  if (meta.status === 'live') {
    if (idx === 0) {
      setTimeout(() => renderExecutive(meta), 50);
    } else if (idx === 1) {
      setTimeout(() => renderCampaigns(meta), 50);
    } else if (idx === 2) {
      setTimeout(() => renderSEO(meta), 50);
    } else if (idx === 3) {
      setTimeout(() => renderB2C(meta), 50);
    } else if (idx === 4) {
      setTimeout(() => renderB2B(meta), 50);
    } else if (idx === 11) {
      setTimeout(() => renderDoprava(meta), 50);
    } else if (idx === 17) {
      setTimeout(() => renderMC(meta), 50);
    } else if (idx === 18) {
      setTimeout(() => renderCloudflare(meta), 50);
    } else {
      setTimeout(() => renderLivePlaceholder(idx, meta), 50);
    }
  }
}

function fmtKc(n) { return n ? n.toLocaleString('cs-CZ') + ' Kč' : '— Kč'; }
function fmtNum(n) { return n != null ? n.toLocaleString('cs-CZ') : '—'; }
function fmtPct(n) { return n != null ? n.toFixed(1) + ' %' : '—'; }
function deltaCls(n) { return n > 0 ? 'positive' : (n < 0 ? 'negative' : 'neutral'); }
function deltaSign(n) { return n > 0 ? '+' : ''; }

// ═══════════════════════════════════════════════════════════════
// DATE FILTERED AGGREGATION — pracuje se STATE.dateFrom/dateTo
// ═══════════════════════════════════════════════════════════════

function aggregateDailyData(dailyRows, fromIso, toIso) {
  if (!dailyRows || !dailyRows.length) return null;
  const f = dailyRows.filter(r => r.date >= fromIso && r.date <= toIso);
  if (!f.length) return { revenue: 0, orders: 0, aov: 0, profit: 0, margin_pct: 0, items: 0, days: 0, period_start: fromIso, period_end: toIso, no_data: true };
  const rev = f.reduce((s, r) => s + (r.revenue_bd || 0), 0);
  const orders = f.reduce((s, r) => s + (r.count || 0), 0);
  const profit = f.reduce((s, r) => s + (r.profit || 0), 0);
  const items = f.reduce((s, r) => s + (r.items || 0), 0);
  return {
    revenue: rev, orders, profit, items,
    aov: orders ? Math.round(rev / orders) : 0,
    margin_pct: rev ? Math.round(profit / rev * 1000) / 10 : 0,
    days: f.length,
    period_start: fromIso,
    period_end: toIso,
  };
}

function shiftDateIso(iso, days) {
  const d = new Date(iso);
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

function previousPeriod(fromIso, toIso) {
  // Calculate previous period (same length, immediately before)
  const days = (new Date(toIso) - new Date(fromIso)) / 86400000 + 1;
  return {
    from: shiftDateIso(fromIso, -days),
    to: shiftDateIso(fromIso, -1),
  };
}

function aggregateMonthlyByRange(monthlyRows, fromIso, toIso) {
  // Filter monthly_trend rows by month string (YYYY-MM)
  const fromM = fromIso.slice(0, 7);
  const toM = toIso.slice(0, 7);
  return (monthlyRows || []).filter(m => m.month >= fromM && m.month <= toM);
}

function dateRangeBadge() {
  const days = (new Date(STATE.dateTo) - new Date(STATE.dateFrom)) / 86400000 + 1;
  return `<span style="background: var(--accent); color: white; padding: 2px 8px; border-radius: 6px; font-size: 11px; margin-left: 8px;">📅 ${STATE.dateFrom} → ${STATE.dateTo} (${Math.round(days)}d)</span>`;
}

function renderPobocky(d) {
  const pobocky = d.pobocky || [];
  const reklamacni = d.reklamacni_sklady || [];
  const unknown = d.unknown_codes || [];
  const brands = d.brand_aggregate || [];
  const regiony = d.regiony_aggregate || [];
  const maxObrat = Math.max(...pobocky.map(p => p.total_obrat), 1);

  // Brand color
  const brandColor = b => b === 'B2B' ? '#a78bfa' : (b === 'B2C' ? '#4ade80' : '#8b93a7');

  // SVG mapa ČR — lat/lng → x/y projekce
  const LAT_MIN = 48.5, LAT_MAX = 51.1, LNG_MIN = 12.0, LNG_MAX = 18.9;
  const mapW = 760, mapH = 380;
  function proj(lat, lng) {
    const x = (lng - LNG_MIN) / (LNG_MAX - LNG_MIN) * mapW;
    const y = mapH - (lat - LAT_MIN) / (LAT_MAX - LAT_MIN) * mapH;
    return [x, y];
  }

  let markers = '';
  for (const p of pobocky) {
    if (p.lat == null || p.lng == null) continue;
    const [x, y] = proj(p.lat, p.lng);
    const r = 6 + Math.sqrt(p.total_obrat / maxObrat) * 26;
    markers += `
      <circle cx="${x.toFixed(0)}" cy="${y.toFixed(0)}" r="${r.toFixed(0)}"
              fill="${brandColor(p.brand)}" fill-opacity="0.6" stroke="#fff" stroke-width="1.5">
        <title>${p.nazev} (${p.mesto}) [${p.brand}/${p.region}]: ${p.total_obrat.toLocaleString('cs-CZ')} Kč, marže ${p.margin_pct}%</title>
      </circle>
      <text x="${x.toFixed(0)}" y="${(y - r - 3).toFixed(0)}" text-anchor="middle" fill="#e6e9f0" font-size="9">${p.mesto}</text>`;
  }

  const b2b = brands.find(b => b.brand === 'B2B') || {};
  const b2c = brands.find(b => b.brand === 'B2C') || {};

  return `
    <div class="card" style="background: rgba(74,222,128,0.06); border-color: var(--green); margin-bottom:16px;">
      <div style="font-size:13px; color:var(--green);">
        ✅ <strong>Pobočky napojeny přes oficiální Cézar mapping</strong> (Podsklady.csv + provozovny). ${d.note}
      </div>
    </div>

    <div class="hero-grid">
      <div class="kpi-card"><div class="kpi-label">Aktivní pobočky</div><div class="kpi-value">${d.pobocky_count_active}</div><div class="kpi-delta neutral">${pobocky.filter(p=>p.brand==='B2B').length} B2B + ${pobocky.filter(p=>p.brand==='B2C').length} B2C</div></div>
      <div class="kpi-card"><div class="kpi-label">Top pobočka (3y)</div><div class="kpi-value" style="font-size:16px">${pobocky[0]?.nazev || '—'}</div><div class="kpi-delta positive">${fmtKc(pobocky[0]?.total_obrat)}</div></div>
      <div class="kpi-card"><div class="kpi-label">B2B obrat (3y)</div><div class="kpi-value" style="color:#a78bfa">${fmtKc(b2b.obrat)}</div><div class="kpi-delta neutral">${b2b.pobocky||0} poboček, marže ${fmtPct(b2b.margin_pct)}</div></div>
      <div class="kpi-card"><div class="kpi-label">B2C obrat (3y)</div><div class="kpi-value" style="color:#4ade80">${fmtKc(b2c.obrat)}</div><div class="kpi-delta neutral">${b2c.pobocky||0} poboček, marže ${fmtPct(b2c.margin_pct)}</div></div>
    </div>

    <div class="card">
      <div class="card-title">🗺️ Mapa poboček ČR (velikost = 3-letý obrat, barva = brand)</div>
      <div style="overflow-x:auto; background:#0d1320; border-radius:8px;">
        <svg viewBox="0 0 ${mapW} ${mapH}" style="width:100%; max-width:${mapW}px; height:auto;">
          <rect width="${mapW}" height="${mapH}" fill="#0d1320"/>
          <text x="12" y="24" fill="#3a4a6b" font-size="13" font-weight="600">ČR — pobočky H&B Group</text>
          <circle cx="${mapW-160}" cy="20" r="6" fill="#a78bfa" fill-opacity="0.6"/><text x="${mapW-148}" y="24" fill="#e6e9f0" font-size="11">B2B (hbgroup)</text>
          <circle cx="${mapW-160}" cy="40" r="6" fill="#4ade80" fill-opacity="0.6"/><text x="${mapW-148}" y="44" fill="#e6e9f0" font-size="11">B2C (klicovecentrum)</text>
          ${markers}
        </svg>
      </div>
      <p style="font-size:11px;color:var(--text-muted);margin-top:8px;">GPS dle měst. Hover marker = detail. Pražské pobočky blízko sebe (Praha-klíčové centrum/Jakov/Zličín/Václavské).</p>
    </div>

    <div class="card" style="margin-top:16px;">
      <div class="card-title">🏪 Pobočky — 3-letý obrat (2023-2026)</div>
      <table>
        <thead><tr><th>#</th><th>Pobočka</th><th>Brand</th><th>Region</th><th class="num">2023</th><th class="num">2024</th><th class="num">2025</th><th class="num">2026*</th><th class="num">Marže</th></tr></thead>
        <tbody>
          ${pobocky.map((p, i) => `

// ČR kraje — grid cartogram pozice (col, row) v přibližném geo rozložení
const CR_KRAJE_GRID = {
  'Karlovarský':      {col: 0, row: 1},
  'Ústecký':          {col: 1, row: 0},
  'Liberecký':        {col: 2, row: 0},
  'Královéhradecký':  {col: 3, row: 0},
  'Plzeňský':         {col: 0, row: 2},
  'Praha':            {col: 2, row: 1},
  'Středočeský':      {col: 1, row: 1},
  'Pardubický':       {col: 3, row: 1},
  'Olomoucký':        {col: 4, row: 1},
  'Moravskoslezský':  {col: 5, row: 0},
  'Jihočeský':        {col: 1, row: 2},
  'Vysočina':         {col: 2, row: 2},
  'Jihomoravský':     {col: 3, row: 2},
  'Zlínský':          {col: 4, row: 2},
};

function heatColor(value, max) {
  // 0 → světle modrá, max → tmavě modrá/červená
  if (!max) return '#1a2033';
  const ratio = value / max;
  if (ratio > 0.75) return '#4ea1ff';  // top
  if (ratio > 0.5) return '#3a7fd0';
  if (ratio > 0.3) return '#2c5f9e';
  if (ratio > 0.15) return '#22456f';
  if (ratio > 0.05) return '#1c3450';
  return '#16263a';
}

function renderRegions(d) {
  const combined = d.cz_combined_for_map || [];
  const b2c = d.cz_b2c_by_kraj || [];
  const b2b = d.cz_b2b_by_kraj || [];
  const sk = d.sk_by_kraj || [];
  const krajMap = {};
  combined.forEach(k => { krajMap[k.kraj] = k.total; });
  const maxVal = Math.max(...combined.map(k => k.total), 1);
  const totalGeo = d.total_orders_geo || combined.reduce((s,k)=>s+k.total,0);

  // SVG cartogram — 6 cols × 3 rows grid
  const cellW = 130, cellH = 80, gap = 8;
  const svgW = 6 * (cellW + gap) + gap;
  const svgH = 3 * (cellH + gap) + gap;
  let cells = '';
  for (const [kraj, pos] of Object.entries(CR_KRAJE_GRID)) {
    const val = krajMap[kraj] || 0;
    const x = gap + pos.col * (cellW + gap);
    const y = gap + pos.row * (cellH + gap);
    const color = heatColor(val, maxVal);
    const pct = totalGeo ? (val / totalGeo * 100).toFixed(1) : 0;
    cells += `
      <g>
        <rect x="${x}" y="${y}" width="${cellW}" height="${cellH}" rx="6"
              fill="${color}" stroke="var(--border)" stroke-width="1">
          <title>${kraj}: ${val.toLocaleString('cs-CZ')} obj (${pct}%)</title>
        </rect>
        <text x="${x + cellW/2}" y="${y + 24}" text-anchor="middle" fill="#e6e9f0" font-size="11" font-weight="600">${kraj.length > 14 ? kraj.slice(0,12)+'…' : kraj}</text>
        <text x="${x + cellW/2}" y="${y + 46}" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">${val.toLocaleString('cs-CZ')}</text>
        <text x="${x + cellW/2}" y="${y + 64}" text-anchor="middle" fill="#8b93a7" font-size="10">${pct}%</text>
      </g>`;
  }

  return `
    <div class="card" style="background: rgba(251,146,60,0.08); border-color: var(--orange); margin-bottom: 16px;">
      <div style="font-size: 13px; color: var(--orange);">
        ⚠️ <strong>Geo data jen z eshopu</strong> (SQL kosik PSČ → kraj). ${d.note}
      </div>
    </div>

    <div class="hero-grid">
      <div class="kpi-card"><div class="kpi-label">Objednávky s geo</div><div class="kpi-value">${fmtNum(totalGeo)}</div><div class="kpi-delta neutral">eshop 2023+</div></div>
      <div class="kpi-card"><div class="kpi-label">Top kraj</div><div class="kpi-value" style="font-size:18px">${combined[0]?.kraj || '—'}</div><div class="kpi-delta positive">${fmtNum(combined[0]?.total)} obj</div></div>
      <div class="kpi-card"><div class="kpi-label">CZ krajů</div><div class="kpi-value">${combined.length}/14</div></div>
      <div class="kpi-card"><div class="kpi-label">SK regionů</div><div class="kpi-value">${sk.length}</div><div class="kpi-delta neutral">${fmtNum(sk.reduce((s,k)=>s+k.total,0))} obj</div></div>
    </div>

    <div class="card">
      <div class="card-title">🗺️ Mapa ČR — objednávky podle krajů (eshop B2C+B2B, choropleth)</div>
      <div style="overflow-x:auto;">
        <svg viewBox="0 0 ${svgW} ${svgH}" style="width:100%; max-width:${svgW}px; height:auto;">
          ${cells}
        </svg>
      </div>
      <p style="font-size:11px;color:var(--text-muted);margin-top:8px;">Barva = intenzita objednávek. Hover zobrazí detail. Rozložení approximate geografické (ne přesné hranice).</p>
    </div>

    <div class="section-grid">
      <div class="card">
        <div class="card-title">🛒 B2C eshop (klicovecentrum.cz) per kraj</div>
        <table>
          <thead><tr><th>#</th><th>Kraj</th><th class="num">Objednávky</th><th class="num">% z B2C</th></tr></thead>
          <tbody>
            ${(() => { const tot=b2c.reduce((s,k)=>s+k.total,0); return b2c.slice(0,14).map((k,i)=>`
              <tr><td class="num">${i+1}</td><td><strong>${k.kraj}</strong></td><td class="num">${fmtNum(k.total)}</td><td class="num">${tot?(k.total/tot*100).toFixed(1):0}%</td></tr>
            `).join(''); })()}
          </tbody>
        </table>
      </div>
      <div class="card">

        <table>
          <thead><tr><th>#</th><th>Kraj</th><th class="num">Objednávky</th><th class="num">% z B2B</th></tr></thead>
          <tbody>
            ${(() => { const tot=b2b.reduce((s,k)=>s+k.total,0); return b2b.slice(0,14).map((k,i)=>`

                <td class="num">${i + 1}</td>
                <td><small style="font-family: monospace; font-size: 11px;">${p.product_id}</small></td>
                <td>${(p.title || '').slice(0, 80)}</td>
                <td>${p.link ? `<a href="${p.link}" target="_blank" style="color: var(--accent); font-size: 11px;">↗</a>` : '—'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    ` : ''}

    <div class="card" style="margin-top: 16px;">
      <div class="card-title">🎯 Akční doporučení</div>
      <ul style="padding-left: 20px; color: var(--text-muted); font-size: 13px;">
        <li><strong>Account-level issues (${s.account_issues_count || 0}):</strong> Logo 2:1 a 1:1 — připravit nové verze podle Google requirements (https://support.google.com/merchants/answer/14555486)</li>
        <li><strong>Disapproved produkty (${s.disapproved}):</strong> Projít každý a opravit (typicky chybí GTIN, image too small, missing brand)</li>
        <li><strong>Per-feed conversion data:</strong> Get Heureka Conv Reports klíč → uvidíme ROAS per feed channel</li>
        <li><strong>Variant coverage:</strong> Mergado feed by měl obsahovat všechny varianty (audit zjistil 0 % coverage = 1 338 disapproved)</li>
        <li><strong>Pro detail MC viz Section 17</strong> (klikni 🛍️ MC tab)</li>
      </ul>
    </div>

    <p style="color: var(--text-muted); font-size: 12px; margin-top: 16px;">
      <strong>Source:</strong> MC API (${d.merchant_id}) · Refresh: ${new Date(d.generated_at).toLocaleString('cs-CZ')}
    </p>
  `;
}

function renderHolistic(d) {
  const mer = d.mer || {};
  const cm = d.channel_mix_seo || {};
  const bb = d.b2b_b2c || {};
  const cr = d.concentration_risk || {};
  const ret = d.retention_signals || {};
  const mc = d.merchant_center_health || {};
  const cf = d.cloudflare_status || {};

  return `
    <div class="card" style="background: rgba(78,161,255,0.08); border-color: var(--accent); margin-bottom: 16px;">
      <div style="font-size: 13px; color: var(--accent);">ℹ️ ${d.note}</div>
    </div>

    <div class="hero-grid">
      <div class="kpi-card"><div class="kpi-label">MER (blended)</div><div class="kpi-value" style="color:${(mer.mer_blended || 0) >= 5 ? 'var(--green)' : 'var(--orange)'}">${mer.mer_blended ? mer.mer_blended + '×' : '—'}</div><div class="kpi-delta neutral">cíl > 5×</div></div>
      <div class="kpi-card"><div class="kpi-label">Total ERP revenue 8M</div><div class="kpi-value">${fmtKc(mer.total_erp_revenue_8m)}</div></div>
      <div class="kpi-card"><div class="kpi-label">Total ERP profit 8M</div><div class="kpi-value">${fmtKc(mer.total_erp_profit_8m)}</div></div>
      <div class="kpi-card"><div class="kpi-label">Marketing spend (Sklik+GAds)</div><div class="kpi-value">${fmtKc(mer.total_marketing_spend_estimated)}</div><div class="kpi-delta neutral">chybí Meta/srovnávače</div></div>
      <div class="kpi-card"><div class="kpi-label">Brand SEO share</div><div class="kpi-value">${fmtPct(cm.brand_share_pct)}</div><div class="kpi-delta neutral">${fmtNum(cm.brand_clicks_12m)} brand kliků</div></div>
      <div class="kpi-card"><div class="kpi-label">B2B/B2C ratio</div><div class="kpi-value">${bb.b2b_to_b2c_ratio}×</div><div class="kpi-delta neutral">B2B vs B2C revenue</div></div>
    </div>

    <div class="section-grid">
      <div class="card">
        <div class="card-title">⚠️ Concentration risk (B2B)</div>
        <table><tbody>
          <tr><td>Top 5 podíl</td><td class="num"><strong style="color:${cr.top_5_pct > 40 ? 'var(--red)' : 'var(--green)'}">${fmtPct(cr.top_5_pct)}</strong></td></tr>
          <tr><td>Top 10 podíl</td><td class="num">${fmtPct(cr.top_10_pct)}</td></tr>
          <tr><td>Top 20 podíl</td><td class="num">${fmtPct(cr.top_20_pct)}</td></tr>
        </tbody></table>
      </div>
      <div class="card">
        <div class="card-title">🔁 Retention signals</div>
        <table><tbody>
          <tr><td>Total unique B2B customers</td><td class="num">${fmtNum(ret.total_unique_customers)}</td></tr>
          <tr><td>Top 20 repeat rate</td><td class="num"><strong style="color:var(--green)">${fmtPct(ret.repeat_rate_top20_pct)}</strong></td></tr>
        </tbody></table>
      </div>
    </div>

    <div class="card" style="margin-top:16px">
      <div class="card-title">🏥 Operativní health</div>
      <table>
        <tbody>
          <tr><td>MC produkty / approval rate</td><td class="num">${fmtNum(mc.total_products)} / ${fmtPct(mc.approval_rate_pct)}</td></tr>
          <tr><td>MC account issues</td><td class="num">${(mc.account_issues || 0) > 0 ? `<span style="color:var(--red)">⚠️ ${mc.account_issues}</span>` : '✅ 0'}</td></tr>
          <tr><td>CF chráněné domény</td><td class="num">${cf.domains_protected || 0}/4</td></tr>
          <tr><td>CF total rules</td><td class="num">${cf.total_rules || 0}</td></tr>
          <tr><td>CF Bot Fight Mode</td><td class="num">${cf.all_bfm_on ? '✅ all 4' : '⚠️ partial'}</td></tr>
        </tbody>
      </table>
    </div>

    <p style="color:var(--text-muted); font-size:12px; margin-top:16px;">
      <strong>Period:</strong> ${d.period_erp?.start} → ${d.period_erp?.end}
    </p>
  `;
}

// ═══════════════════════════════════════════════════════════════
// EVENT WIRING
// ═══════════════════════════════════════════════════════════════

document.querySelectorAll('.date-preset').forEach(btn => {
  btn.addEventListener('click', () => applyPreset(btn.dataset.preset));
});

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => renderSection(parseInt(btn.dataset.section)));
});

document.getElementById('dateFrom').addEventListener('change', e => {
  STATE.dateFrom = e.target.value;
  STATE.preset = 'custom';
  document.querySelectorAll('.date-preset').forEach(b => b.classList.remove('active'));
  saveStateToURL();
  renderSection(STATE.section);
});

document.getElementById('dateTo').addEventListener('change', e => {
  STATE.dateTo = e.target.value;
  STATE.preset = 'custom';
  document.querySelectorAll('.date-preset').forEach(b => b.classList.remove('active'));
  saveStateToURL();
  renderSection(STATE.section);
});

document.getElementById('compareMode').addEventListener('change', e => {
  STATE.comparePreset = e.target.value;
  saveStateToURL();
  renderSection(STATE.section);
});

// Market / type / domain filter handlers — interlocked logic
document.getElementById('marketFilter').addEventListener('change', e => {
  STATE.market = e.target.value;
  // Reset domain filter když market změnit (jinak by zůstala selected nekonzistentní doména)
  STATE.domain = 'all';
  document.getElementById('domainFilter').value = 'all';
  saveStateToURL();
  renderSection(STATE.section);
});
document.getElementById('typeFilter').addEventListener('change', e => {
  STATE.type = e.target.value;
  STATE.domain = 'all';
  document.getElementById('domainFilter').value = 'all';
  saveStateToURL();
  renderSection(STATE.section);
});
document.getElementById('domainFilter').addEventListener('change', e => {
  STATE.domain = e.target.value;
  // Auto-set market + type podle domény
  if (STATE.domain === 'klicovecentrum.cz') { STATE.market = 'cz'; STATE.type = 'b2c'; }
  else if (STATE.domain === 'klucovecentrum.sk') { STATE.market = 'sk'; STATE.type = 'b2c'; }
  else if (STATE.domain === 'hbgroup.cz') { STATE.market = 'cz'; STATE.type = 'b2b'; }
  else if (STATE.domain === 'hbgroup.sk') { STATE.market = 'sk'; STATE.type = 'b2b'; }
  document.getElementById('marketFilter').value = STATE.market;
  document.getElementById('typeFilter').value = STATE.type;
  saveStateToURL();
  renderSection(STATE.section);
});

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  switch (e.key.toLowerCase()) {
    case 't': applyPreset('today'); break;
    case 'w': applyPreset('last7'); break;
    case 'm': applyPreset('last30'); break;
    case 'y': applyPreset('ytd'); break;
  }
});

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════

(async function init() {
  loadStateFromURL();
  await loadMeta();
  renderSection(STATE.section);
})();
</script>
</body>
</html>
